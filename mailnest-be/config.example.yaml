server:
  host: "127.0.0.1"
  port: 8080

app:
  dataDir: "./data"
  allowRegistration: true
  jwtSecret: "change-me-in-production"
  jwtExpireHours: 168
  credentialSecret: "change-me-32-byte-secret-value"

database:
  # driver 支持 sqlite、mysql、postgres；不配置时默认 sqlite。
  driver: "sqlite"
  # sqlite 使用 path；mysql/postgres 使用 dsn。
  path: "./data/mailnest.db"
  dsn: ""
  maxOpenConns: 4
  maxIdleConns: 4

oauth:
  microsoft:
    tenant: "consumers"
    clientId: ""
    clientSecret: ""
    redirectUrl: "http://127.0.0.1:5173/oauth/microsoft/callback"
