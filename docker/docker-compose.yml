services:
  mailnest-be:
    image: ligson/mailnest-be:${MAILNEST_BE_IMAGE_TAG:-${MAILNEST_IMAGE_TAG:-latest}}
    container_name: mailnest-be
    restart: always
    environment:
      MAILNEST_CONFIG: /app/config.yaml
    volumes:
      - ./config.yaml:/app/config.yaml:ro
      - ./data:/data
    networks:
      - mynetwork

  mailnest-fe:
    image: ligson/mailnest-fe:${MAILNEST_FE_IMAGE_TAG:-${MAILNEST_IMAGE_TAG:-latest}}
    container_name: mailnest-fe
    restart: always
    depends_on:
      - mailnest-be
    networks:
      - mynetwork

networks:
  mynetwork:
    external: true
