server:
  host: "0.0.0.0"
  port: 8080

app:
  dataDir: "/data"
  allowRegistration: true
  jwtSecret: "change-me-in-production"
  jwtExpireHours: 168
  credentialSecret: "change-me-32-byte-secret-value"

database:
  # driver 支持 sqlite、mysql、postgres；生产默认继续使用 sqlite，确保本地 data 持久化。
  driver: "sqlite"
  # sqlite 使用 path；mysql/postgres 使用 dsn。
  path: "/data/mailnest.db"
  dsn: ""
  maxOpenConns: 4
  maxIdleConns: 4

oauth:
  microsoft:
    tenant: "consumers"
    clientId: ""
    clientSecret: ""
    redirectUrl: "https://mailnest.example.com/oauth/microsoft/callback"
